<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A Gift From The Heart 💝</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Great+Vibes&family=Lato:wght@300;400&display=swap');

/* ══════════════════ TOKENS ══════════════════ */
:root {
  --rose:#ff4d7d; --rose-lt:#ff85a1; --gold:#f0b429; --gold-lt:#fde68a;
  --plum:#7c2d52; --deep:#0e0016; --velvet:#1a0024; --mauve:#8b3a62;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--deep);font-family:'Lato',sans-serif;-webkit-tap-highlight-color:transparent}

/* ══════════════════ CANVASES ══════════════════ */
#bg-canvas     {position:fixed;inset:0;z-index:0}
#particle-canvas{position:fixed;inset:0;z-index:2;pointer-events:none}

/* ══════════════════ STICKERS ══════════════════ */
.sticker{
  position:fixed;pointer-events:none;z-index:3;
  font-size:var(--fs,1.5rem);
  animation:stk-float var(--d,8s) ease-in-out var(--dl,0s) infinite alternate;
  filter:drop-shadow(0 2px 8px rgba(255,77,125,.4));
  user-select:none;
}
@keyframes stk-float{
  0%  {transform:translate(0,0) rotate(var(--r0,-5deg)) scale(1)}
  50% {transform:translate(var(--mx,8px),var(--my,-12px)) rotate(var(--r1,5deg)) scale(1.05)}
  100%{transform:translate(var(--ex,-5px),var(--ey,6px)) rotate(var(--r2,-3deg)) scale(.97)}
}

/* ══════════════════ GIFT BOX STAGE ══════════════════ */
#stage{
  position:fixed;inset:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
}
#open-hint{
  font-family:'Great Vibes',cursive;
  font-size:clamp(1.3rem,4vw,1.9rem);
  color:var(--gold-lt);
  text-shadow:0 0 20px rgba(240,180,41,.7),0 0 50px rgba(240,180,41,.35);
  margin-bottom:24px;
  opacity:0;
  animation:hint-in 1.2s cubic-bezier(.2,.8,.3,1) 1.8s forwards, hint-pulse 2.8s ease-in-out 3.5s infinite;
  text-align:center;padding:0 20px;
}
@keyframes hint-in   {from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes hint-pulse{0%,100%{text-shadow:0 0 20px rgba(240,180,41,.7),0 0 50px rgba(240,180,41,.35)}
                      50%    {text-shadow:0 0 35px rgba(240,180,41,1), 0 0 80px rgba(240,180,41,.5)}}

/* Glow halo */
#gift-scene{position:relative;display:flex;flex-direction:column;align-items:center;transition:transform .6s,opacity .6s}
#gift-scene::before{
  content:'';position:absolute;inset:-50px;border-radius:50%;
  background:radial-gradient(ellipse,rgba(255,77,125,.3) 0%,rgba(255,77,125,.1) 40%,transparent 70%);
  animation:halo-breathe 3s ease-in-out infinite;z-index:-1;
}
@keyframes halo-breathe{0%,100%{transform:scale(1);opacity:.8}50%{transform:scale(1.12);opacity:1}}

#gift-box-wrap{
  position:relative;cursor:pointer;
  animation:box-idle 4s ease-in-out infinite;
}
@keyframes box-idle{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-10px) rotate(1deg)}}
#gift-box-wrap:hover {animation:none;transform:translateY(-14px) scale(1.04)}
#gift-box-wrap.shaking{animation:box-shake .5s cubic-bezier(.36,.07,.19,.97) forwards !important}
@keyframes box-shake{
  0%{transform:rotate(0)}15%{transform:rotate(-6deg) scale(1.05)}30%{transform:rotate(6deg) scale(1.06)}
  45%{transform:rotate(-5deg) scale(1.05)}60%{transform:rotate(5deg) scale(1.04)}
  75%{transform:rotate(-3deg)}100%{transform:rotate(0) scale(1)}
}
.gift-svg{width:clamp(220px,38vw,330px);height:auto;overflow:visible;
  filter:drop-shadow(0 22px 55px rgba(255,77,125,.55)) drop-shadow(0 8px 22px rgba(0,0,0,.55))}
#box-lid{transform-origin:50% 100%;transition:transform .75s cubic-bezier(.4,0,.2,1),opacity .45s ease .5s}
#box-lid.fly-off{transform:translateY(-160px) translateX(18px) rotate(-28deg) scale(.75);opacity:0}
#box-shadow-el{
  width:clamp(150px,26vw,240px);height:16px;border-radius:50%;margin-top:-6px;
  background:radial-gradient(ellipse,rgba(0,0,0,.55) 0%,transparent 70%);
  animation:shadow-b 4s ease-in-out infinite;
}
@keyframes shadow-b{0%,100%{transform:scaleX(1);opacity:.7}50%{transform:scaleX(.86);opacity:.42}}

/* ══════════════════ MUSIC BAR ══════════════════ */
#music-bar{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:50;
  display:flex;align-items:center;gap:12px;
  background:rgba(20,0,30,.75);backdrop-filter:blur(20px);
  border:1px solid rgba(255,77,125,.35);border-radius:50px;
  padding:10px 20px;
  opacity:0;transition:opacity .6s ease;
  pointer-events:none;
}
#music-bar.visible{opacity:1;pointer-events:all}
.note-icon{font-size:1.2rem;animation:note-bounce 1.2s ease-in-out infinite alternate}
@keyframes note-bounce{from{transform:translateY(0)}to{transform:translateY(-4px)}}
#music-label{
  font-family:'Great Vibes',cursive;font-size:1rem;
  color:var(--gold-lt);text-shadow:0 0 10px rgba(240,180,41,.6);
  white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;
}
/* Waveform bars */
.wave{display:flex;align-items:flex-end;gap:3px;height:22px}
.wbar{
  width:3px;border-radius:2px;background:var(--rose-lt);
  animation:wbar-anim var(--wd,.6s) ease-in-out var(--wdl,0s) infinite alternate;
}
@keyframes wbar-anim{from{height:4px;opacity:.5}to{height:var(--wh,16px);opacity:1}}
#mute-btn{
  background:none;border:none;cursor:pointer;font-size:1.1rem;
  color:rgba(255,255,255,.6);transition:color .2s;padding:2px 4px;
}
#mute-btn:hover{color:var(--rose)}
/* Progress ring */
#music-progress{
  width:28px;height:28px;flex-shrink:0;
}
#prog-track{fill:none;stroke:rgba(255,255,255,.15);stroke-width:3}
#prog-fill {fill:none;stroke:var(--gold);stroke-width:3;stroke-linecap:round;
  stroke-dasharray:75.4;stroke-dashoffset:75.4;
  transition:stroke-dashoffset .4s ease;
  transform:rotate(-90deg);transform-origin:50% 50%;
}

/* ══════════════════ PHOTO STAGE ══════════════════ */
#photo-stage{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .8s ease;
  padding:16px 12px;gap:0;
}
#photo-stage.active{opacity:1;pointer-events:all}

/* ── CARD WRAPPER: photo TOP, quote BOTTOM ── */
#card-wrap{
  display:flex;flex-direction:column;
  align-items:center;
  gap:0;
  width:min(380px,94vw);
}

/* Photo frame */
.photo-card{
  position:relative;
  width:100%;
  aspect-ratio:4/5;
  border-radius:22px;
  overflow:visible;
  /* Reset inline before each entry */
  opacity:1;
  transform:translateY(90px) scale(.82) rotate(var(--lean,0deg));
  transition:
    opacity  .85s cubic-bezier(.2,.8,.3,1),
    transform .85s cubic-bezier(.2,.8,.3,1),
    box-shadow .4s ease;
  box-shadow:0 20px 60px rgba(255,77,125,.3),0 0 0 1.5px rgba(255,130,160,.25),0 8px 28px rgba(0,0,0,.5);
  cursor:pointer;
  flex-shrink:0;
  animation: glowPulse 2.5s ease-in-out infinite;

}
@keyframes glowPulse {
  0% {
    box-shadow: 0 0 20px rgba(255,77,125,0.4);
  }
  50% {
    box-shadow: 0 0 60px rgba(255,77,125,0.8),
                0 0 100px rgba(240,180,41,0.4);
  }
  100% {
    box-shadow: 0 0 20px rgba(255,77,125,0.4);
  }
}
.photo-card.entered{
  opacity:1;
  transform:translateY(0) scale(1.05) rotate(var(--lean,0deg));
  box-shadow:0 28px 80px rgba(255,77,125,.45),0 0 0 1.5px rgba(240,180,41,.4),0 10px 40px rgba(0,0,0,.5);
}
.photo-card:hover{
  box-shadow:0 40px 100px rgba(255,77,125,.6),0 0 0 2px rgba(240,180,41,.7) !important;
  transform:translateY(-5px) scale(1.02) rotate(0deg) !important;
}

/* Spinning border glow */
.photo-card::after{
  content:'';position:absolute;inset:-2px;border-radius:24px;z-index:-1;
  background:conic-gradient(from var(--ang,0deg),#ff4d7d,#f0b429,#da70d6,#ff99cc,#ff4d7d);
  opacity:.8;animation:card-spin 5s linear infinite;
}
@property --ang{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes card-spin{to{--ang:360deg}}

/* ── PHOTO IMAGE AREA ── */
.photo-img-wrap{
  width:100%;height:100%;position:relative;
  background:linear-gradient(160deg,#1a0028 0%,#0e0016 100%);
  position: relative !important;
  overflow: hidden;
  z-index: 100 !important;
  .photo-img-wrap {
  border: 5px solid red;
}
}

/* The actual image — user replaces src */
.photo-img-wrap img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  position:absolute;inset:0;
  border-radius:20px;
}
#photo-img {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: 50;

  
}


.photo-img-wrap.animate {
  animation: photoZoom 0.8s ease;
  animation-fill-mode: both;
}

@keyframes photoZoom {
  0% {
    transform: scale(1.2);
    opacity: 0;
  }
  100% {
    transform: scale(1);
    opacity: 1;
  }
}
/* Overlay gradient at bottom so label sits nicely */
.photo-img-wrap::after{
  content:'';position:absolute;inset:0;border-radius:20px;
  background:linear-gradient(to top,rgba(0,0,0,.55) 0%,transparent 45%);
  pointer-events:none;z-index:1 !important;
}
/* Photo number badge */
.photo-badge{
  position:absolute;top:14px;right:14px;z-index:3;
  background:rgba(20,0,32,.65);backdrop-filter:blur(12px);
  border:1px solid rgba(255,77,125,.4);border-radius:20px;
  padding:4px 12px;
  font-family:'Lato',sans-serif;font-weight:300;font-size:.72rem;
  color:rgba(255,210,225,.8);letter-spacing:2px;text-transform:uppercase;
}
/* Photo title at bottom inside image */
.photo-title-overlay{
  position:absolute;bottom:16px;left:16px;right:16px;z-index:3;
  font-family:'Great Vibes',cursive;font-size:1.35rem;
  color:#fff;
  text-shadow:0 2px 12px rgba(0,0,0,.8),0 0 20px rgba(255,77,125,.5);
}
/* Shimmer sweep */
.photo-shimmer{
  position:absolute;inset:0;z-index:2;pointer-events:none;border-radius:20px;
  background:linear-gradient(105deg,transparent 40%,rgba(255,255,255,.09) 50%,transparent 60%);
  background-size:200% 100%;
  animation:shimmer 3.5s ease-in-out 1s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Emoji placeholder shown when no image is provided */
.photo-placeholder{
  width:100%;height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:30px;
  position:absolute;z-index: 0;
}
.ph-emoji   {font-size:clamp(3rem,9vw,5rem);filter:drop-shadow(0 0 20px rgba(255,77,125,.9));animation:ph-pulse 2s ease-in-out infinite alternate}
@keyframes ph-pulse{from{filter:drop-shadow(0 0 12px rgba(255,77,125,.7))}to{filter:drop-shadow(0 0 28px rgba(255,77,125,1)) drop-shadow(0 0 50px rgba(240,180,41,.5))}}
.ph-add-text{font-family:'Lato',sans-serif;font-weight:300;font-size:.7rem;color:rgba(255,255,255,.3);letter-spacing:3px;text-transform:uppercase}

/* ── QUOTE CARD — sits directly below photo ── */
.quote-card{
  width:calc(100% - 20px);
  background:rgba(20,0,32,.7);
  backdrop-filter:blur(24px);
  border:1px solid rgba(255,77,125,.25);
  border-top:none;
  border-radius:0 0 20px 20px;
  padding:18px 22px 20px;
  text-align:center;
  opacity:0;transform:translateY(-10px);
  transition:opacity .7s ease .55s,transform .7s ease .55s;
  box-shadow:0 12px 40px rgba(0,0,0,.4);
}
.quote-card.shown{opacity:1;transform:translateY(0)}
.q-mark{
  font-family:'Playfair Display',serif;font-size:2.2rem;
  color:var(--rose);line-height:.4;display:block;margin-bottom:6px;
  text-shadow:0 0 16px rgba(255,77,125,.6);
}
.q-text{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(.83rem,2.4vw,1rem);color:rgba(255,220,232,.9);
  line-height:1.65;letter-spacing:.2px;display:block;
}
.q-author{
  display:block;margin-top:8px;
  font-family:'Great Vibes',cursive;font-size:1.05rem;
  color:var(--gold-lt);text-shadow:0 0 12px rgba(240,180,41,.55);
}

/* tap hint below quote */
.tap-hint{
  font-family:'Lato',sans-serif;font-weight:300;font-size:.7rem;
  color:rgba(255,255,255,.25);letter-spacing:3px;text-transform:uppercase;
  margin-top:10px;
  animation:tap-blink 2s ease-in-out infinite;
}
@keyframes tap-blink{0%,100%{opacity:.25}50%{opacity:.55}}

/* Progress dots */
#photo-dots{display:flex;gap:10px;margin-top:14px}
.pdot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.18);transition:all .4s cubic-bezier(.34,1.56,.64,1)}
.pdot.active{background:var(--rose);transform:scale(1.5);box-shadow:0 0 10px var(--rose),0 0 20px rgba(255,77,125,.4)}
.pdot.done  {background:rgba(218,112,214,.5)}



/* ══════════════════ MOSAIC STAGE ══════════════════ */
#mosaic-stage{
  position:fixed;inset:0;z-index:30;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 1s ease;
  padding:16px;gap:18px;overflow:hidden;
}
#mosaic-stage.active{opacity:1;pointer-events:all}
#mosaic-title{
  font-family:'Great Vibes',cursive;
  font-size:clamp(1.8rem,5vw,2.8rem);
  color:var(--gold-lt);text-shadow:0 0 28px rgba(240,180,41,.8),0 0 60px rgba(240,180,41,.3);
  text-align:center;flex-shrink:0;
  opacity:0;transform:scale(.7) translateY(20px);
  transition:opacity 1s ease,transform 1s cubic-bezier(.2,.8,.3,1);
}
#mosaic-title.in{opacity:1;transform:scale(1) translateY(0)}
.mosaic-grid{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:clamp(5px,1.5vw,12px);
  max-width:min(680px,96vw);width:100%;
}
.m-cell{
  aspect-ratio:3/4;border-radius:12px;position:relative;overflow:hidden;
  background:linear-gradient(145deg,rgba(255,77,125,.12),rgba(124,45,82,.22));
  border:1.5px solid rgba(255,130,160,.22);
  box-shadow:0 4px 18px rgba(255,77,125,.18);
  opacity:0;transform:scale(.65) rotate(var(--ml,0deg));
  transition:opacity .55s ease,transform .55s cubic-bezier(.2,.8,.3,1),box-shadow .3s;
  cursor:pointer;
}
.m-cell::after{
  content:'';position:absolute;inset:-2px;border-radius:14px;z-index:-1;
  background:conic-gradient(from var(--ang,0deg),#ff4d7d,#f0b429,#da70d6,#ff4d7d);
  opacity:.4;animation:card-spin 6s linear infinite;
}
.m-cell.in{opacity:1;transform:scale(1) rotate(var(--ml,0deg));box-shadow:0 6px 24px rgba(255,77,125,.28)}
.m-cell:hover{transform:scale(1.07) rotate(0deg) !important;box-shadow:0 14px 45px rgba(255,77,125,.5),0 0 0 2px rgba(240,180,41,.5) !important;z-index:5}
.m-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(160deg,rgba(26,0,38,.9),rgba(14,0,22,.95));gap:4px;padding:6px}
.m-inner img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:10px}
.m-emoji{font-size:clamp(1rem,2.2vw,1.6rem)}
.m-label{font-family:'Great Vibes',cursive;font-size:clamp(.55rem,1.2vw,.8rem);color:var(--gold-lt);text-align:center;text-shadow:0 0 6px rgba(240,180,41,.6)}
.m-quote-mini{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:5px 5px 7px;font-family:'Lato',sans-serif;font-weight:300;font-size:clamp(.42rem,.9vw,.62rem);color:rgba(255,210,220,.75);text-align:center;line-height:1.3;z-index:4}

#mosaic-msg{
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:clamp(.88rem,2.2vw,1.15rem);color:rgba(255,220,235,.75);
  text-align:center;max-width:580px;line-height:1.85;
  opacity:0;transition:opacity 1s ease;flex-shrink:0;padding:0 20px;
}
#mosaic-msg.in{opacity:1}
#replay-btn{
  padding:12px 36px;border:none;border-radius:50px;cursor:pointer;
  background:linear-gradient(135deg,var(--rose),var(--plum));
  color:#fff;font-family:'Lato',sans-serif;font-weight:300;
  font-size:.88rem;letter-spacing:2px;text-transform:uppercase;
  box-shadow:0 0 22px rgba(255,77,125,.45),0 0 50px rgba(255,77,125,.18);
  opacity:0;transform:translateY(14px);
  transition:opacity .8s ease,transform .8s ease,box-shadow .25s;flex-shrink:0;
}
#replay-btn.in{opacity:1;transform:translateY(0)}
#replay-btn:hover{transform:scale(1.06) translateY(0) !important;box-shadow:0 0 40px rgba(255,77,125,.7)}

/* ══════════════════ FLOATERS ══════════════════ */
.float-heart{position:fixed;pointer-events:none;z-index:4;bottom:-50px;animation:fh-rise var(--d,5s) ease-out var(--dl,0s) forwards}
@keyframes fh-rise{
  0%{bottom:-50px;opacity:0;transform:translateX(0) scale(.8) rotate(0)}
  8%{opacity:1}
  40%{transform:translateX(var(--s1,20px)) scale(1) rotate(var(--r1,8deg))}
  70%{transform:translateX(var(--s2,-15px)) scale(.95) rotate(var(--r2,-6deg))}
  100%{bottom:108vh;opacity:0;transform:translateX(var(--s3,10px)) scale(.7) rotate(0)}
}
.petal{position:fixed;top:-30px;pointer-events:none;z-index:3;animation:petal-fall var(--d,4s) ease-in var(--dl,0s) forwards}
@keyframes petal-fall{
  0%{top:-30px;transform:rotate(0) translateX(0);opacity:1}
  80%{opacity:.8}
  100%{top:108vh;transform:rotate(var(--spin,360deg)) translateX(var(--dx,40px));opacity:0}
}

/* ══════════════════ CURTAIN ══════════════════ */
#curtain{position:fixed;inset:0;z-index:9999;background:var(--deep);pointer-events:none;opacity:0;transition:opacity 0s}
#curtain.close{opacity:1;transition:opacity .5s cubic-bezier(.4,0,1,1)}
#curtain.open {opacity:0;transition:opacity .7s cubic-bezier(0,0,.2,1)}
</style>
</head>
<body>

<!-- LAYERS -->
<div id="curtain"></div>
<canvas id="bg-canvas"></canvas>
<canvas id="particle-canvas"></canvas>
<div id="stickers"></div>

<!-- ══════════════════════════════════════
     AUDIO — one <audio> per photo (replace src!)
     Songs play for 10 s then cross-fade to next
══════════════════════════════════════ -->
<!--
  HOW TO REPLACE:
  Change src="music/song1.mp3" etc. to your actual file paths.
  You can use the same file for all 8 if you only have one song.
-->
<audio id="song0" src="music/song3.mp3" preload="none" loop></audio>
<audio id="song1" src="music/song2.mp3" preload="none" loop></audio>
<audio id="song2" src="music/song1.mp3" preload="none" loop></audio>
<audio id="song3" src="music/song4.mp3" preload="none" loop></audio>
<audio id="song4" src="music/song5.mp3" preload="none" loop></audio>
<audio id="song5" src="music/song6.mp3" preload="none" loop></audio>
<audio id="song6" src="music/song7.mp3" preload="none" loop></audio>
<audio id="song7" src="music/song8.mp3" preload="none" loop></audio>

<!-- MUSIC BAR -->
<div id="music-bar">
  <span class="note-icon">🎵</span>
  <span id="music-label">Playing…</span>
  <div class="wave" id="wave-bars"></div>
  <svg id="music-progress" viewBox="0 0 28 28">
    <circle id="prog-track" cx="14" cy="14" r="12"/>
    <circle id="prog-fill"  cx="14" cy="14" r="12"/>
  </svg>
  <button id="mute-btn" onclick="toggleMute()">🔊</button>
</div>

<!-- ══════════════════════════════════════
     STAGE 1 — GIFT BOX
══════════════════════════════════════ -->
<div id="stage">
  <p id="open-hint">✨ Tap the gift to open ✨</p>

  <div id="gift-scene">
    <div id="gift-box-wrap" onclick="startOpen()">

      <!-- ═════ REALISTIC GIFT BOX SVG ═════ -->
      <svg class="gift-svg" viewBox="0 0 320 300" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="body-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"   stop-color="#c0143c"/>
            <stop offset="45%"  stop-color="#8b0a2a"/>

/* ══════════════════════════════════════════════════════
   MUSIC ENGINE — per-photo audio with 10-s fade cycle
══════════════════════════════════════════════════════ */
let currentAudio   = null;
let musicMuted     = false;
let musicTimer     = null;
let progInterval   = null;
let musicStartTime = 0;
const MUSIC_DURATION = 10; // seconds per photo

function getAudio(idx) { return document.getElementById('song' + idx); }

function buildWaveBars() {
  const w = document.getElementById('wave-bars');
  w.innerHTML = '';
  const heights = [8,14,10,18,12,16,8,14,10];
  heights.forEach((h, i) => {
    const b = document.createElement('div');
    b.className = 'wbar';
    b.style.cssText = `--wd:${.35+i*.07}s;--wdl:${i*.06}s;--wh:${h}px;`;
    w.appendChild(b);
  });
}

function updateProgressRing(elapsed) {
  const pct  = Math.min(elapsed / MUSIC_DURATION, 1);
  const circ = 2 * Math.PI * 12; // r=12
  document.getElementById('prog-fill').style.strokeDashoffset = circ * (1 - pct);
}

function startMusicForPhoto(idx) {
  // Stop any previous
  if (currentAudio) { fadeOut(currentAudio, 500); }
  clearInterval(progInterval);
  clearTimeout(musicTimer);

  const audio = getAudio(idx);
  currentAudio = audio;
  document.getElementById('music-label').textContent = PHOTOS[idx].songLabel;
  document.getElementById('music-bar').classList.add('visible');

  audio.volume = 0;
  audio.currentTime = 0;
  if (!musicMuted) {
    audio.play().catch(() => {});
    fadeIn(audio, 800);
  }
  musicStartTime = Date.now();
  updateProgressRing(0);

  // Progress ring update
  progInterval = setInterval(() => {
    const elapsed = (Date.now() - musicStartTime) / 1000;
    updateProgressRing(elapsed);
  }, 200);
}

function fadeIn(audio, ms) {
  const steps = 20, delta = 1 / steps;
  let v = 0;
  const t = setInterval(() => {
    v = Math.min(v + delta, 0.85);
    audio.volume = v;
    if (v >= 0.85) clearInterval(t);
  }, ms / steps);
}

function fadeOut(audio, ms) {
  const t = setInterval(() => {
    audio.volume = Math.max(0, audio.volume - 0.08);
    if (audio.volume <= 0) { audio.pause(); clearInterval(t); }
  }, ms / 10);
}

function toggleMute() {
  musicMuted = !musicMuted;
  document.getElementById('mute-btn').textContent = musicMuted ? '🔇' : '🔊';
  if (currentAudio) {
    if (musicMuted) { fadeOut(currentAudio, 300); }
    else { currentAudio.play().catch(()=>{}); fadeIn(currentAudio, 600); }
  }
}

══════════════════════════════════════════════════════ */
const bgCvs = document.getElementById('bg-canvas');
const bgCtx = bgCvs.getContext('2d');
let bgW, bgH, bgT = 0;
const STARS = Array.from({length:200}, () => ({
  x:Math.random(), y:Math.random(),
  r:.3+Math.random()*2, a:.1+Math.random()*.7, s:1.5+Math.random()*4, p:Math.random()*Math.PI*2,
}));
function resizeBg(){bgW=bgCvs.width=window.innerWidth;bgH=bgCvs.height=window.innerHeight}
window.addEventListener('resize',resizeBg);resizeBg();

function drawBg() {
  bgT += .004;
  bgCtx.clearRect(0,0,bgW,bgH);
  const g=bgCtx.createLinearGradient(0,0,bgW,bgH);
  g.addColorStop(0,'#08000f');g.addColorStop(.4,'#110018');g.addColorStop(.75,'#1c0022');g.addColorStop(1,'#0c000f');
  bgCtx.fillStyle=g;bgCtx.fillRect(0,0,bgW,bgH);
  [
    {cx:.2,cy:.7,rx:.55,ry:.35,c1:'rgba(175,18,75,.2)',t:bgT*.7},
    {cx:.8,cy:.3,rx:.5,ry:.3,c1:'rgba(115,8,155,.16)',t:bgT*.5},
    {cx:.5,cy:.5,rx:.6,ry:.42,c1:'rgba(195,45,95,.13)',t:bgT*.9},
    {cx:.15,cy:.2,rx:.42,ry:.26,c1:'rgba(75,0,115,.12)',t:bgT*.6},
    {cx:.85,cy:.8,rx:.46,ry:.3,c1:'rgba(155,18,58,.17)',t:bgT*.8},
  ].forEach(a=>{
    const x=(a.cx+Math.sin(a.t)*.06)*bgW, y=(a.cy+Math.cos(a.t*1.3)*.05)*bgH;
    const rg=bgCtx.createRadialGradient(x,y,0,x,y,a.rx*bgW);
    rg.addColorStop(0,a.c1);rg.addColorStop(1,'rgba(0,0,0,0)');
    bgCtx.fillStyle=rg;bgCtx.fillRect(0,0,bgW,bgH);
  });
  STARS.forEach(s=>{
    const alpha=s.a*(.5+.5*Math.sin(bgT*s.s+s.p));
    bgCtx.save();bgCtx.globalAlpha=alpha;
    bgCtx.shadowBlur=5;bgCtx.shadowColor='#ffb3cc';
    bgCtx.beginPath();bgCtx.arc(s.x*bgW,s.y*bgH,s.r,0,Math.PI*2);
    bgCtx.fillStyle='#fff';bgCtx.fill();bgCtx.restore();
  });
  requestAnimationFrame(drawBg);
}
drawBg();

function hexToRgba(hex,alpha){

  return `rgba(${parseInt(h.slice(0,2),16)},${parseInt(h.slice(2,4),16)},${parseInt(h.slice(4,6),16)},${alpha})`;
}
const SCOLS=['#ff4d7d','#ff85a1','#f0b429','#fde68a','#da70d6','#c084fc','#ff99cc','#ffe082'];

class Spark{
  constructor(x,y,color){
    this.x=x;this.y=y;this.color=color;
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*5;
    this.vx=Math.cos(a)*s;this.vy=Math.sin(a)*s-1.5;
    this.life=1;this.decay=.012+Math.random()*.018;
    this.size=2+Math.random()*3;this.gravity=.06;this.trail=[];
  }
  update(){
    this.trail.push({x:this.x,y:this.y});if(this.trail.length>8)this.trail.shift();
    this.x+=this.vx;this.y+=this.vy;this.vy+=this.gravity;
    this.vx*=.97;this.vy*=.97;this.life-=this.decay;
  }
  draw(){
    const a=Math.max(0,this.life);
    if(this.trail.length>1){
      for(let i=1;i<this.trail.length;i++){
        const t=i/this.trail.length;
        pCtx.save();pCtx.globalAlpha=a*t*.4;
        pCtx.beginPath();pCtx.moveTo(this.trail[i-1].x,this.trail[i-1].y);pCtx.lineTo(this.trail[i].x,this.trail[i].y);
        pCtx.strokeStyle=this.color;pCtx.lineWidth=this.size*t;
        pCtx.shadowBlur=5;pCtx.shadowColor=this.color;pCtx.stroke();pCtx.restore();
      }
    }
    const r=this.size*a;if(r<.1)return;
    pCtx.save();pCtx.globalAlpha=a;
    const gr=pCtx.createRadialGradient(this.x,this.y,0,this.x,this.y,r*3);
    gr.addColorStop(0,hexToRgba(this.color,1));gr.addColorStop(.4,hexToRgba(this.color,.6));gr.addColorStop(1,hexToRgba(this.color,0));
    pCtx.beginPath();pCtx.arc(this.x,this.y,r*3,0,Math.PI*2);pCtx.fillStyle=gr;pCtx.fill();
    pCtx.beginPath();pCtx.arc(this.x,this.y,r*.5,0,Math.PI*2);pCtx.fillStyle='#fff';pCtx.shadowBlur=10;pCtx.shadowColor=this.color;pCtx.fill();
    pCtx.restore();
  }
}

function burst(x,y,n=55){for(let i=0;i<n;i++)parts.push(new Spark(x,y,SCOLS[Math.floor(Math.random()*SCOLS.length)]))}
function pLoop(){pCtx.clearRect(0,0,pW,pH);parts=parts.filter(p=>p.life>0);parts.forEach(p=>{p.update();p.draw()});requestAnimationFrame(pLoop)}
pLoop();

function curtain(cb){

  c.classList.remove('open');void c.offsetWidth;c.classList.add('close');

let currentPhoto=0;

const PHOTO_SHOW_MS=10000; // 10 seconds per photo

function buildDots(){
  const cont=document.getElementById('photo-dots');cont.innerHTML='';
  PHOTOS.forEach((_,i)=>{
    const d=document.createElement('div');
    d.className='pdot'+(i===0?' active':'');
    cont.appendChild(d);
  });
}
function updateDots(idx){
  document.querySelectorAll('.pdot').forEach((d,i)=>{d.classList.toggle('active',i===idx);d.classList.toggle('done',i<idx)});
}

  card.style.transform=`translateY(90px) scale(.82) rotate(${lean})`;

  // ── Photo image ──
  if (p.src && p.src !== '') {


  
  const wrap = document.getElementById('photo-img-wrap');
// 🔥 FORCE FULL RESET
wrap.style.animation = 'none';

// force reflow
void wrap.offsetHeight;

// reapply animation
wrap.style.animation = 'photoZoom 0.8s ease';

   imgEl.style.display = 'block';

} else {

}

  // ── Overlay texts ──
  badge.textContent   = `${idx+1} / ${PHOTOS.length}`;

    setTimeout(()=>{
      const r = card.getBoundingClientRect();
      burst(r.left + Math.random()*r.width, r.top + Math.random()*r.height, 15);
    }, i*150);
  }

  }));

  updateDots(idx);

  // ── Music ──
  startMusicForPhoto(idx);
}

function advancePhoto(){
  if(currentPhoto < PHOTOS.length-1){
    currentPhoto++;
    showPhoto(currentPhoto);
    if(currentPhoto===PHOTOS.length-1){
      clearTimeout(autoTimer);
      autoTimer=setTimeout(showMosaic, PHOTO_SHOW_MS);
    } else {
      resetAutoTimer();
    }
  }
}

function resetAutoTimer(){
  clearTimeout(autoTimer);
  autoTimer=setTimeout(advancePhoto, PHOTO_SHOW_MS);
}

function handleCardTap(){
  clearTimeout(autoTimer);
  clearInterval(progInterval);
  if(currentPhoto<PHOTOS.length-1){
    advancePhoto();
  }
}

function startPhotoSequence(){
  document.getElementById('photo-stage').classList.add('active');
  buildDots();
  currentPhoto=0;
  showPhoto(0);
  resetAutoTimer();
  // Ambient hearts
  let hl=setInterval(()=>spawnHearts(3),4000);
  setTimeout(()=>clearInterval(hl),90000);
}

/* ══════════════════════════════════════════════════════
   MOSAIC
══════════════════════════════════════════════════════ */
function showMosaic(){
  // Stop music
  if(currentAudio){fadeOut(currentAudio,600);}
  clearInterval(progInterval);
  document.getElementById('music-bar').classList.remove('visible');

  curtain(()=>{
    document.getElementById('photo-stage').classList.remove('active');
    document.getElementById('mosaic-stage').classList.add('active');
    buildMosaic();
  });
}

function buildMosaic(){
  const grid=document.getElementById('mosaic-grid');grid.innerHTML='';
  const leans=['-2deg','1.5deg','-1.2deg','2deg','-1.8deg','1deg','-2.5deg','1.8deg'];
  PHOTOS.forEach((p,i)=>{
    const cell=document.createElement('div');cell.className='m-cell';cell.style.setProperty('--ml',leans[i]);
    // Use image if provided, else emoji
    const imgHtml = p.src ? `<img src="${p.src}" alt="${p.label}">` : '';
    cell.innerHTML=`
      <div class="m-inner">
        ${imgHtml}
        ${!p.src?`<span class="m-emoji">${p.emoji}</span>`:''}
        <span class="m-label">${p.label}</span>
      </div>
      <div class="m-quote-mini">${p.quote.slice(0,48)}…</div>`;
    grid.appendChild(cell);
    setTimeout(()=>{
      cell.classList.add('in');
      const r=cell.getBoundingClientRect();
      burst(r.left+r.width/2,r.top+r.height/2,16);
    },200+i*200);
  });
  setTimeout(()=>document.getElementById('mosaic-title').classList.add('in'),350);
  setTimeout(()=>document.getElementById('mosaic-msg').classList.add('in'),1900+PHOTOS.length*200);
  setTimeout(()=>document.getElementById('replay-btn').classList.add('in'),2700+PHOTOS.length*200);
  // Celebration
  setTimeout(()=>{
    for(let i=0;i<5;i++)setTimeout(()=>{burst(Math.random()*pW,Math.random()*pH*.6,38);spawnPetals(7);spawnHearts(4)},i*380);
  },500);
}

function replayAll(){
  if(currentAudio){fadeOut(currentAudio,300);}
  clearInterval(progInterval);clearTimeout(autoTimer);parts=[];
  curtain(()=>{
    // Reset mosaic
    ['mosaic-stage','mosaic-title','mosaic-msg','replay-btn'].forEach(id=>{

      el.classList.remove('active','in');

    // Reset photo stage
    document.getElementById('photo-stage').classList.remove('active');
    document.getElementById('current-card').classList.remove('entered');
    document.getElementById('current-quote').classList.remove('shown');
    document.getElementById('music-bar').classList.remove('visible');

    giftOpened=false;
    const scene=document.getElementById('gift-scene');
    scene.style.transition='';scene.style.transform='';scene.style.opacity='';scene.style.display='';
